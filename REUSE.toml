SPDX-FileCopyrightText = "2019 IBM Corp."
SPDX-License-Identifier = "OFL-1.1"

[[annotations]]
path = "resources/fonts/InstrumentSerif-*.ttf"
precedence = "override"
SPDX-FileCopyrightText = "2022 The Instrument Serif Project Authors (https://github.com/Instrument/instrument-serif)"
SPDX-License-Identifier = "OFL-1.1"

[[annotations]]
path = "resources/fonts/JetBrainsMono-*.ttf"
precedence = "override"
SPDX-FileCopyrightText = "2020 The JetBrains Mono Project Authors (https://github.com/JetBrains/JetBrainsMono)"
SPDX-License-Identifier = "OFL-1.1"

[[annotations]]
path = "resources/fonts/Manrope-*.ttf"
precedence = "override"
SPDX-FileCopyrightText = "2019 The Manrope Project Authors (https://github.com/sharanda/manrope)"
SPDX-License-Identifier = "OFL-1.1"
