# SPDX-License-Identifier: MPL-2.0

name: Feature request
description: Suggest an idea or improvement for Ruwa.
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Ruwa is a solo-maintained project with an opinionated design. For larger
        ideas, please open this request to discuss the approach **before** writing
        code. See [CONTRIBUTING.md](https://github.com/LuskusDeus/Ruwa/blob/main/CONTRIBUTING.md).
  - type: textarea
    id: problem
    attributes:
      label: Problem or motivation
      description: What are you trying to do, and what makes it hard today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the feature or change you'd like to see.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches or workarounds you've thought about.
    validations:
      required: false
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Mockups, references to other tools, or anything else that helps.
    validations:
      required: false
